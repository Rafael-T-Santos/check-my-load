version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: checkmyload
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: checkmyloaddb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: 
      context: ./server
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
    depends_on:
      - db

  frontend:
    build:
      context: .
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: